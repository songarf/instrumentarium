# ═══════════════════════════════════════════════════════════════
#  GitHub Actions: Build portable binaries for all platforms
#  Triggers on push to main or tag v*
# ═══════════════════════════════════════════════════════════════

name: Build Portable Binaries

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pytest
        run: pip install pytest

      - name: Run tests
        run: python -m pytest tests/ -v

  build:
    needs: [test]
    if: needs.test.result == 'success'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            spec: video-downloader.spec
            artifact-name: linux

          - os: windows-latest
            spec: video-downloader-win.spec
            artifact-name: windows

          - os: macos-latest
            spec: video-downloader.spec
            artifact-name: macos

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build deps
        shell: bash
        run: |
          pip install pyinstaller pywebview
          if [ "${{ runner.os }}" = "Windows" ]; then
            pip install cefpython3
          fi

      - name: Build binary
        run: |
          # Force clean PyInstaller cache (Windows/Linux)
          python -c "import shutil, os, sys; cache = os.path.join(os.environ.get('LOCALAPPDATA' if sys.platform=='win32' else 'HOME', ''), 'pyinstaller', 'bincache'); shutil.rmtree(cache, errors='ignore') if os.path.isdir(cache) else None"
          pyinstaller ${{ matrix.spec }} --clean --distpath dist --workpath build

      - name: Copy download.html to dist (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Copy-Item "$env:GITHUB_WORKSPACE/download.html" -Destination dist/

      - name: Copy download.html to dist (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: cp "$GITHUB_WORKSPACE/download.html" dist/

      - name: Upload dist files as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: dist/*
          retention-days: 30

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Create archives
        run: |
          mkdir -p release-files
          # Linux: exe is Instrumentarium (no extension)
          if [ -f release-artifacts/linux/Instrumentarium ]; then
            cd release-artifacts/linux
            tar czf ../../release-files/Instrumentarium-linux.tar.gz Instrumentarium download.html
            cd ../..
          fi
          # Windows: exe is Instrumentarium.exe
          if [ -f release-artifacts/windows/Instrumentarium.exe ]; then
            cd release-artifacts/windows
            zip ../../release-files/Instrumentarium-windows.zip Instrumentarium.exe download.html
            cd ../..
          fi
          # macOS
          if [ -f release-artifacts/macos/Instrumentarium ]; then
            cd release-artifacts/macos
            tar czf ../../release-files/Instrumentarium-macos.tar.gz Instrumentarium download.html
            cd ../..
          fi
          ls -la release-files/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-files/*
          generate_release_notes: true
          make_latest: true