# ═══════════════════════════════════════════════════════════════
#  GitHub Actions: Build portable binaries for all platforms
#  Triggers on push to main or tag v*
# ═══════════════════════════════════════════════════════════════

name: Build Portable Binaries

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pytest
        run: pip install pytest

      - name: Run tests
        run: python -m pytest tests/ -v

  build:
    needs: [test]
    if: needs.test.result == 'success'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            spec: video-downloader.spec
            artifact-name: linux
            archive-cmd: tar czf VideoDownloader-linux.tar.gz VideoDownloader
            archive-name: VideoDownloader-linux.tar.gz

          - os: windows-latest
            spec: video-downloader-win.spec
            artifact-name: windows
            archive-cmd: Compress-Archive -Path VideoDownloader.exe -DestinationPath VideoDownloader-windows.zip
            archive-name: VideoDownloader-windows.zip

          - os: macos-latest
            spec: video-downloader.spec
            artifact-name: macos
            archive-cmd: tar czf VideoDownloader-macos.tar.gz VideoDownloader
            archive-name: VideoDownloader-macos.tar.gz

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build deps
        run: |
          pip install pyinstaller pywebview

      - name: Build binary
        run: pyinstaller ${{ matrix.spec }} --distpath dist --workpath build

      - name: Prepare archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        working-directory: dist
        run: ${{ matrix.archive-cmd }}

      - name: Prepare archive (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        working-directory: dist
        run: ${{ matrix.archive-cmd }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: dist/${{ matrix.archive-name }}
          retention-days: 30

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Prepare release files
        run: |
          mkdir -p release-files
          find release-artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" \) -exec cp {} release-files/ \;
          ls -la release-files/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-files/*
          generate_release_notes: true
          make_latest: true