# ═══════════════════════════════════════════════════════════════
#  GitHub Actions: Build portable binaries for all platforms
#  Triggers on push to main or tag v*
# ═══════════════════════════════════════════════════════════════

name: Build Portable Binaries

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pytest
        run: pip install pytest

      - name: Run tests
        run: python -m pytest tests/ -v

  build:
    needs: [test]
    if: needs.test.result == 'success'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            spec: video-downloader.spec
            artifact-name: linux-instrumentarium

          - os: windows-latest
            spec: video-downloader-win.spec
            artifact-name: windows-instrumentarium

          - os: macos-latest
            spec: video-downloader.spec
            artifact-name: macos-instrumentarium

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build deps
        shell: bash
        run: |
          pip install pyinstaller pywebview
          if [ "${{ runner.os }}" = "Windows" ]; then
            pip install cefpython3
          fi

      - name: Build binary
        run: |
          # Force clean PyInstaller cache (Windows/Linux)
          python -c "import shutil, os, sys; cache = os.path.join(os.environ.get('LOCALAPPDATA' if sys.platform=='win32' else 'HOME', ''), 'pyinstaller', 'bincache'); shutil.rmtree(cache, errors='ignore') if os.path.isdir(cache) else None"
          pyinstaller ${{ matrix.spec }} --clean --distpath dist --workpath build

      - name: Upload binary as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: dist/Instrumentarium*
          retention-days: 30

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Create archives
        run: |
          mkdir -p release-files
          # Each artifact dir contains one file: Instrumentarium or Instrumentarium.exe
          for platform in linux windows macos; do
            src=$(find release-artifacts/$platform -name 'Instrumentarium*' -type f | head -1)
            if [ -n "$src" ]; then
              ext="${src##*.}"
              if [ "$platform" = "windows" ]; then
                # Wrap single exe in zip
                cd "$(dirname "$src")"
                zip ../../release-files/Instrumentarium-windows.zip "$(basename "$src")"
                cd -
              else
                # Wrap single binary in tar.gz
                cd "$(dirname "$src")"
                tar czf ../../release-files/Instrumentarium-${platform}.tar.gz "$(basename "$src")"
                cd -
              fi
            fi
          done
          ls -la release-files/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-files/*
          generate_release_notes: true
          make_latest: true