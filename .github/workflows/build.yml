# ═══════════════════════════════════════════════════════════════
#  GitHub Actions: Build portable binaries for all platforms
#  Triggers on push to main or tag v*
# ═══════════════════════════════════════════════════════════════

name: Build Portable Binaries

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pytest
        run: pip install pytest

      - name: Run tests
        run: python -m pytest tests/ -v

  build:
    needs: [test]
    if: needs.test.result == 'success'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            spec: video-downloader.spec
            artifact-name: linux-instrumentarium

          - os: windows-latest
            spec: video-downloader-win.spec
            artifact-name: windows-instrumentarium

          - os: macos-latest
            spec: video-downloader-macos.spec
            artifact-name: macos-instrumentarium
            is-macos: true

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build deps
        shell: bash
        run: |
          pip install pyinstaller pywebview
          if [ "${{ runner.os }}" = "Windows" ]; then
            pip install cefpython3
          fi

      - name: Generate macOS icon
        if: matrix.is-macos
        shell: bash
        run: |
          cd assets
          bash gen_icns.sh
          cd ..

      - name: Build binary
        shell: bash
        run: |
          # Force clean PyInstaller cache
          python -c "import shutil, os, sys; cache = os.path.join(os.environ.get('LOCALAPPDATA' if sys.platform=='win32' else 'HOME', ''), 'pyinstaller', 'bincache'); shutil.rmtree(cache, errors='ignore') if os.path.isdir(cache) else None"
          pyinstaller ${{ matrix.spec }} --clean --distpath dist --workpath build

      - name: Sign and notarize (macOS)
        if: matrix.is-macos
        shell: bash
        run: |
          # Ad-hoc codesign (no Apple Developer Account needed for basic sign)
          if [ -d "dist/Instrumentarium.app" ]; then
            codesign --force --deep --sign - --entitlements assets/entitlements.plist dist/Instrumentarium.app 2>/dev/null || echo "⚠️  codesign skipped (no signing identity)"
          fi

      - name: Prepare dist for upload
        shell: bash
        run: |
          # Remove leftover binary from BUNDLE build (macOS leaves Instrumentarium exe beside .app)
          if [ -f "dist/Instrumentarium" ] && [ -d "dist/Instrumentarium.app" ]; then
            rm -f dist/Instrumentarium
          fi

      - name: Upload binary as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: |
            dist/Instrumentarium*
          retention-days: 30

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Prepare release files
        shell: bash
        run: |
          mkdir -p release-files
          for platform in linux windows macos; do
            if [ "$platform" = "windows" ]; then
              src=$(find release-artifacts/$platform -name '*.exe' -type f | head -1)
              if [ -n "$src" ]; then
                cp "$src" release-files/Instrumentarium.exe
              fi
            elif [ "$platform" = "macos" ]; then
              app=$(find release-artifacts/$platform -name 'Instrumentarium.app' -type d | head -1)
              if [ -n "$app" ]; then
                cd "$(dirname "$app")"
                tar czf ../../release-files/Instrumentarium-macos.tar.gz "$(basename "$app")"
                cd -
              else
                src=$(find release-artifacts/$platform -name 'Instrumentarium' -type f | head -1)
                if [ -n "$src" ]; then
                  cd "$(dirname "$src")"
                  tar czf ../../release-files/Instrumentarium-macos.tar.gz "$(basename "$src")"
                  cd -
                fi
              fi
            else
              src=$(find release-artifacts/$platform -name 'Instrumentarium' -type f | head -1)
              if [ -n "$src" ]; then
                cp "$src" release-files/Instrumentarium-linux
              fi
            fi
          done
          ls -la release-files/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-files/*
          generate_release_notes: true
          make_latest: true